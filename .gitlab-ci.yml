stages:
  - build

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"

cache:
  paths:
    - .m2/repository/

build:
  stage: build
  tags:
    - chatops
    - shell
  script:
    # Parent POM 6.x + maven-hpi-plugin 3.18+ requires JDK 21 to build.
    # Runner must have JDK 21 pre-staged at this path (coordinated with webos-infraops).
    - export JAVA_HOME=/home/swfarmer/.local/java/jdk-21.0.11+10
    - export PATH="$JAVA_HOME/bin:/home/swfarmer/.local/maven/apache-maven-3.9.6/bin:$PATH"
    - java -version
    - mvn -version
    - mvn clean package -DskipTests -B
  artifacts:
    paths:
      - target/*.hpi
    expire_in: 30 days
  only:
    - tags
